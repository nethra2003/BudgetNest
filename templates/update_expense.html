{% extends 'base.html' %}
{% load static %}

{% block content %}



<body style="background:url('{% static 'images/addmem.jpg' %}');
            background-size:cover;
            background-attachment:fixed;
            background-position:center;">

<h1 align="center">Update Expense</h1>

<form action="{% url 'update_expense' data.id %}" method="post">
    {% csrf_token %}
    <table align="center">
        <tr>
            <td>
                <input class="form-control form-control-lg" type="text" placeholder="Purpose" name="purpose" value="{{ data.purpose }}" required>
            </td>
        </tr>
        <tr>
            <td>
                <input class="form-control form-control-lg" type="number" placeholder="Expense" name="expense" value="{{ data.expense }}" required>
            </td>
        </tr>
        <tr>
            <td>
                <input class="form-control form-control-lg" type="date" name="date" value="{{ data.date|date:'Y-m-d' }}" required>
            </td>
        </tr>
        <tr>
            <td>
                <input type="submit" value="Update Expense" class="btn btn-primary btn-lg btn-block">
            </td>
        </tr>
    </table>
</form>

</body>
{% endblock %}
