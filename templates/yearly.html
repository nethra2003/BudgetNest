{% extends 'base.html' %}
{% load static %}
{% block content %}
<body style="background:url('{% static 'images/blue1.png' %}');
            background-size:cover;
            background-attachment:fixed;
            background-position:center;">
<div class="container toppart">
    <form class="form-inline" action="{% url 'yearly' %}" method="post">
        {% csrf_token %}
        <label class="my-1 mr-2" for="inlineFormCustomSelectPref1">Year</label>
        <select class="custom-select my-1 mr-sm-2" id="inlineFormCustomSelectPref1" name="year">
            {% for year in years %}
            <option value="{{ year }}" {% if year == start_year %}selected{% endif %}>{{ year }}</option>
            {% endfor %}
        </select>
        <input type="submit" class="btn btn-primary my-1 mr-2" value="Filter">
    </form>

    <div class="bottomtab">
        <table class="table">
            <thead class="thead-primary">
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Purpose</th>
                    <th scope="col">Amount</th>
                    <th scope="col">Date</th>
                </tr>
            </thead>
            <tbody>
                {% for i in records %}
                <tr>
                    <td>{{ i.name.name }}</td>
                    <td>{{ i.purpose }}</td>
                    <td>{{ i.expense }}</td>
                    <td>{{ i.date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <h3>{{ norecords }}</h3>
    </div>
</div>

{% endblock %}
