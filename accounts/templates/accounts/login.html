<!DOCTYPE html>
<html>
<head>
    <title>Login - BudgetNest</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* 🌄 Background Image */
            background-image: url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        /* Glass card */
        .login-box {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            width: 340px;
            color: white;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        /* Login image */
        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        .msg {
            color: yellow;
            font-size: 14px;
            text-align: center;
        }

        a {
            color: #fff;
        }

        p {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-box">

    <!-- 🔐 Login Image -->
   <div style="text-align:center; margin-bottom:10px;">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
         alt="BudgetNest Login"
         style="width:80px; height:80px;">
</div>

    <h2>Login</h2>

    {% for message in messages %}
        <p class="msg">{{ message }}</p>
    {% endfor %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>
        Don't have an account?
        <a href="{% url 'signup' %}">Signup</a>
    </p>

</div>

</body>
</html>
