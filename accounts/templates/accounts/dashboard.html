{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
    .hero-container {
        position: relative;
        height: 100vh;
        width: 100%;
    }

    .hero-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .overlay-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
    }

</style>

<div class="hero-container">
    <img src="{% static 'images/fam.png' %}" alt="Dashboard Image">
</div>

{% endblock %}
